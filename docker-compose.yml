version: '3.9'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oncoreconcile-api
    ports:
      - "8000:8000"
    environment:
      - API_ENV=production
      - DATABASE_TYPE=postgresql
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/oncoreconcile
      - LOG_LEVEL=INFO
    depends_on:
      - db
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command: >
      sh -c "uvicorn src.api.main:app --host 0.0.0.0 --port 8000"
    networks:
      - oncoreconcile-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Streamlit Frontend
  frontend:
    image: python:3.11-slim
    container_name: oncoreconcile-frontend
    ports:
      - "8501:8501"
    working_dir: /app
    volumes:
      - ./frontend:/app/frontend
      - ./src:/app/src
      - ./data:/app/data
    environment:
      - STREAMLIT_CLIENT_SHOWERRORDETAILS=true
      - STREAMLIT_LOGGER_LEVEL=debug
      - API_URL=http://api:8000
    command: >
      bash -c "pip install -q streamlit==1.29.0 requests==2.31.0 && 
               streamlit run frontend/streamlit_app.py --server.port=8501 --server.address=0.0.0.0"
    depends_on:
      - api
    networks:
      - oncoreconcile-network

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: oncoreconcile-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=oncoreconcile
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/database:/docker-entrypoint-initdb.d
    networks:
      - oncoreconcile-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: oncoreconcile-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - oncoreconcile-network

volumes:
  postgres_data:

networks:
  oncoreconcile-network:
    driver: bridge
